name: clarity
description: Clarity — screen-time blocking & habit recovery app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.2.0

  # State management
  flutter_riverpod: ^2.5.1

  # Fonts
  google_fonts: ^6.2.1

  # Icons  (tabler icon set used in prototype)
  flutter_tabler_icons: ^1.43.0

  # Utilities
  shared_preferences: ^2.2.3
  intl: ^0.19.0

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  firebase_messaging: ^14.7.20

  # Social sign-in
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
